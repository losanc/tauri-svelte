# reference: Tauri GitHub Action - builds Tauri application as a native binary for macOS, Linux and Windows and optionally upload it to a GitHub Release.
name: 'publish'

on:
  push:
    branches:
      - release
    tags:
      - 'test'

jobs:
  build-wasm:
    if: startsWith(github.ref, 'refs/tags/test') || github.ref == 'refs/heads/release'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: build wasm
        run: pnpm build:wasm

      - name: upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-gpu
          path: src-frontend/src/lib/wasm_gpu/
          retention-days: 1

  test:
    if: startsWith(github.ref, 'refs/tags/test')
    needs: build-wasm
    strategy:
      fail-fast: false
      matrix:
        platform: ['macos-latest', 'ubuntu-22.04', 'windows-latest']
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install frontend dependencies
        run: pnpm install

      - name: download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-gpu
          path: src-frontend/src/lib/wasm_gpu/

      - name: frontend type check
        run: pnpm check

      - name: frontend tests
        run: pnpm test

      - name: backend tests
        run: cargo test --workspace

      - name: check Rust formatting
        run: |
          if ! cargo fmt --all -- --check; then
            echo "::warning::Rust code is not formatted. Run 'cargo fmt' locally."
          fi

  # On each push to the `release` branch it will create or update a GitHub release, build your app, and upload the artifacts to the release.
  publish-tauri:
    if: github.ref == 'refs/heads/release'
    needs: build-wasm
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install frontend dependencies
        run: pnpm install

      - name: download wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-gpu
          path: src-frontend/src/lib/wasm_gpu/

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          beforeBuildCommand: 'pnpm build:frontend'
